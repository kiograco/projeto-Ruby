services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: delivery_tracker
      POSTGRES_PASSWORD: delivery_tracker
      POSTGRES_DB: delivery_tracker_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    command: ["rails", "server", "-b", "0.0.0.0"]
    volumes:
      - ./backend:/app
      - api_bundle:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://delivery_tracker:delivery_tracker@postgres:5432/delivery_tracker_development
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  sidekiq:
    build:
      context: ./backend
    command: ["bundle", "exec", "sidekiq"]
    volumes:
      - ./backend:/app
      - api_bundle:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://delivery_tracker:delivery_tracker@postgres:5432/delivery_tracker_development
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  redis_data:
  api_bundle:
