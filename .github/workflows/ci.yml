name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend / Rubocop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend
      - name: Rubocop
        working-directory: backend
        run: bundle exec rubocop

  backend-test:
    name: Backend / RSpec
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: delivery_tracker
          POSTGRES_PASSWORD: delivery_tracker
          POSTGRES_DB: delivery_tracker_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U delivery_tracker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RAILS_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: delivery_tracker
      DATABASE_PASSWORD: delivery_tracker
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Install libpq
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libpq-dev
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend
      - name: Set up database
        working-directory: backend
        run: bin/rails db:create db:schema:load
      - name: RSpec
        working-directory: backend
        run: bundle exec rspec

  frontend:
    name: Frontend / typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npx tsc -b --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  mobile:
    name: Mobile / typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json
      - working-directory: mobile
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit

  docker-publish:
    name: Docker / build & publish (main only)
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend, mobile]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (main only)
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy
        run: |
          echo "No deploy target is configured for this repository yet."
          echo "Wire this step to your host (Railway/Render/AWS/Fly) once one is chosen --"
          echo "e.g. a 'railway up' / 'render deploy' CLI call, or an SSH+docker-compose pull,"
          echo "authenticated via repository secrets."
